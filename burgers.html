<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>البرغر</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="food-page">
      <h2>البرغر</h2>

      <div class="burger-layout">
        <div class="top-row">
          <div class="meal-cardBB tall-card">
            <img src="./images/burgerD.jpeg" alt="وجبة برغر لحم دوبل" />
            <div class="price">₪30</div>
            <h3>وجبة برغر لحم دبل</h3>
          </div>
        </div>

        <div class="middle-row">
          <div class="meal-cardB">
            <img src="./images/burger.jpeg" alt="وجبة برغر لحم" />
            <div class="price">₪22</div>
            <h3>وجبة برغر لحم</h3>
          </div>

          <div class="meal-cardB">
            <img src="./images/burgerG.jpeg" alt="وجبة برغر دجاج" />
            <div class="price">₪22</div>
            <h3>وجبة برغر دجاج</h3>
          </div>
        </div>

        <div class="bottom-row">
          <div class="meal-cardB">
            <img src="./images/burger1.jpeg" alt="ساندويش برغر دجاج" />
            <div class="price">₪15</div>
            <h3>ساندويش برغر دجاج</h3>
          </div>

          <div class="meal-cardB">
            <img src="./images/burger2.jpeg" alt="ساندويش برغر لحم" />
            <div class="price">₪18</div>
            <h3>ساندويش برغر لحم</h3>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
