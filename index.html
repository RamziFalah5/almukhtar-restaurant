    <section class="hero">
      <button class="mobile-category-toggle" id="mobileToggle">
        اضغط لعرض أقسام المنيو
        <i class="fas fa-chevron-down"></i>
      </button>

      <div class="dashboard-layout">
        <aside class="sidebar" id="sidebarMenu">
          <a
            href="restaurant-meal.html"
            target="content-frame"
            class="dash-link active-side"
            >الواجهة الرئيسية</a
          >
          <a href="musahab.html" target="content-frame" class="dash-link"
            >مسحب</a
          >
          <a href="baska.html" target="content-frame" class="dash-link"
            >باشكا</a
          >
          <a href="burgers.html" target="content-frame" class="dash-link"
            >برغر</a
          >
          <a
            href="chicken-fingers.html"
            target="content-frame"
            class="dash-link"
            >أصابع الدجاج</a
          >
          <a href="zinger.html" target="content-frame" class="dash-link"
            >زنجر</a
          >
          <a href="chicken-wings.html" target="content-frame" class="dash-link"
            >أجنحة الدجاج</a
          >
          <a href="fries.html" target="content-frame" class="dash-link"
            >بطاطا</a
          >
          <a href="sausages.html" target="content-frame" class="dash-link"
            >نقانق</a
          >
          <a href="salads.html" target="content-frame" class="dash-link"
            >سلطات</a
          >
          <a href="drinks.html" target="content-frame" class="dash-link"
            >مشروبات</a

            >صوصات</a
          >
        </aside>

        <div class="content-area">
          <iframe
            src="restaurant-meal.html"
            name="content-frame"
            class="content-frame"
            id="contentFrame"
            title="محتوى المطعم"
          ></iframe>
        </div>
      </div>
    </section>

    <script>
      const mobileToggle = document.getElementById("mobileToggle");
      const sidebarMenu = document.getElementById("sidebarMenu");
      const sidebarLinks = document.querySelectorAll(".dash-link");
      const contentFrame = document.getElementById("contentFrame");
      const toggleIcon = mobileToggle.querySelector("i");

      let iframeLoaderContainer = null;
      let menuBackdrop = null;
      let loaderTimeoutId = null;
      let loaderFallbackTimeoutId = null;

      // Initialize loader and backdrop on page load
      function initializeLoaderAndBackdrop() {
        const contentArea = document.querySelector(".content-area");
        if (contentArea && !iframeLoaderContainer) {
          iframeLoaderContainer = document.createElement("div");
          iframeLoaderContainer.className = "iframe-loader-container hidden";
          iframeLoaderContainer.innerHTML = '<div class="iframe-loader"></div>';
          contentArea.style.position = "relative";
          contentArea.appendChild(iframeLoaderContainer);
        }

        if (!menuBackdrop) {
          menuBackdrop = document.createElement("div");
          menuBackdrop.className = "menu-backdrop";
          document.body.appendChild(menuBackdrop);
        }
      }

      function showIframeLoader() {
        if (iframeLoaderContainer) {
          iframeLoaderContainer.classList.remove("hidden");
        }
        if (loaderTimeoutId) clearTimeout(loaderTimeoutId);
        if (loaderFallbackTimeoutId) clearTimeout(loaderFallbackTimeoutId);
        loaderTimeoutId = setTimeout(hideIframeLoader, 700);
        loaderFallbackTimeoutId = setTimeout(hideIframeLoader, 1000);
      }

      function hideIframeLoader() {
        if (iframeLoaderContainer) {
          iframeLoaderContainer.classList.add("hidden");
        }
        if (loaderTimeoutId) clearTimeout(loaderTimeoutId);
        if (loaderFallbackTimeoutId) clearTimeout(loaderFallbackTimeoutId);
      }

      function toggleIconChevron(showUp) {
        const upClass = "fa-chevron-up";
        const downClass = "fa-chevron-down";
        if (showUp) {
          toggleIcon.classList.remove(downClass);
          toggleIcon.classList.add(upClass);
        } else {
          toggleIcon.classList.remove(upClass);
          toggleIcon.classList.add(downClass);
        }
      }

      function closeMobileMenu() {
        sidebarMenu.classList.remove("show-sidebar");
        if (menuBackdrop) {
          menuBackdrop.classList.remove("visible");
        }
        toggleIconChevron(false);
      }

      function showMenuBackdrop() {
        if (menuBackdrop) {
          menuBackdrop.classList.add("visible");
        }
      }

      function hideMenuBackdrop() {
        if (menuBackdrop) {
          menuBackdrop.classList.remove("visible");
        }
      }

      function triggerPageTransition() {
        contentFrame.classList.add("page-exiting");
        setTimeout(() => {
          contentFrame.classList.remove("page-exiting");
          contentFrame.classList.add("page-entering");
          showIframeLoader();
        }, 150);
      }

      mobileToggle.addEventListener("click", function () {
        if (sidebarMenu.classList.contains("show-sidebar")) {
          closeMobileMenu();
        } else {
          sidebarMenu.classList.add("show-sidebar");
          showMenuBackdrop();
          toggleIconChevron(true);
        }
      });

      document.addEventListener("click", function (e) {
        if (
          menuBackdrop &&
          e.target === menuBackdrop &&
          sidebarMenu.classList.contains("show-sidebar")
        ) {
          closeMobileMenu();
        }
      });

      sidebarLinks.forEach((link) => {
        link.addEventListener("click", function () {
          sidebarLinks.forEach((item) => item.classList.remove("active-side"));
          this.classList.add("active-side");
          triggerPageTransition();

          if (window.innerWidth <= 991) {
            setTimeout(closeMobileMenu, 150);
          }
        });
      });

      function resizeIframe() {
        try {
          contentFrame.style.height =
            contentFrame.contentWindow.document.body.scrollHeight + "px";
        } catch (e) {
          // Cross-origin or not yet loaded
        }
      }

      contentFrame.addEventListener("load", function () {
        resizeIframe();
        hideIframeLoader();
        setTimeout(() => {
          contentFrame.classList.remove("page-entering");
        }, 400);
      });

      window.addEventListener("resize", resizeIframe);
      initializeLoaderAndBackdrop();
    </script>
  </body>
</html>
